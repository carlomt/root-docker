name: Docker Multiarch Image CI

on:
  push:
    tags:
      - "v*"

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/root
  CMAKE_CXX_STANDARD: "17"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker_build:
    name: Build ${{ matrix.distro }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu24
            context: ./ubuntu24_from_source
            runner: ubuntu-24.04
            arch: amd64
          - distro: ubuntu24
            context: ./ubuntu24_from_source
            runner: ubuntu-24.04-arm
            arch: arm64
          - distro: alma10
            context: ./alma10_from_source
            runner: ubuntu-24.04
            arch: amd64
          - distro: alma10
            context: ./alma10_from_source
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set build variables from tag
        run: |
          ROOT_VERSION="${GITHUB_REF_NAME#v}"

          if [ -z "$ROOT_VERSION" ] || [ "$ROOT_VERSION" = "$GITHUB_REF_NAME" ]; then
            echo "This workflow expects tags like v6.40.00" >&2
            exit 1
          fi

          echo "ROOT_VERSION=${ROOT_VERSION}" >> "$GITHUB_ENV"
          echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/root" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Hub image by digest
        id: build_dockerhub
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.DOCKERHUB_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            ROOT_VERSION=${{ env.ROOT_VERSION }}
            CMAKE_CXX_STANDARD=${{ env.CMAKE_CXX_STANDARD }}
          cache-from: type=gha,scope=${{ matrix.distro }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}-${{ matrix.arch }}

      - name: Build and push GHCR image by digest
        id: build_ghcr
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            ROOT_VERSION=${{ env.ROOT_VERSION }}
            CMAKE_CXX_STANDARD=${{ env.CMAKE_CXX_STANDARD }}
          cache-from: type=gha,scope=${{ matrix.distro }}-${{ matrix.arch }}

      - name: Export Docker Hub digest
        run: |
          mkdir -p /tmp/digests/dockerhub
          digest="${{ steps.build_dockerhub.outputs.digest }}"
          touch "/tmp/digests/dockerhub/${digest#sha256:}"

      - name: Export GHCR digest
        run: |
          mkdir -p /tmp/digests/ghcr
          digest="${{ steps.build_ghcr.outputs.digest }}"
          touch "/tmp/digests/ghcr/${digest#sha256:}"

      - name: Upload Docker Hub digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-dockerhub-${{ matrix.distro }}-${{ matrix.arch }}
          path: /tmp/digests/dockerhub/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload GHCR digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-ghcr-${{ matrix.distro }}-${{ matrix.arch }}
          path: /tmp/digests/ghcr/*
          if-no-files-found: error
          retention-days: 1

  docker_manifest:
    name: Create manifest ${{ matrix.distro }}
    needs: docker_build
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu24
          - distro: alma10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set build variables from tag
        run: |
          ROOT_VERSION="${GITHUB_REF_NAME#v}"

          if [ -z "$ROOT_VERSION" ] || [ "$ROOT_VERSION" = "$GITHUB_REF_NAME" ]; then
            echo "This workflow expects tags like v6.40.00" >&2
            exit 1
          fi

          echo "ROOT_VERSION=${ROOT_VERSION}" >> "$GITHUB_ENV"
          echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/root" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download Docker Hub digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests/dockerhub
          pattern: digests-dockerhub-${{ matrix.distro }}-*
          merge-multiple: true

      - name: Download GHCR digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests/ghcr
          pattern: digests-ghcr-${{ matrix.distro }}-*
          merge-multiple: true

      - name: Create and push Docker Hub manifest for versioned ${{ matrix.distro }} tag
        run: |
          docker_refs=()
          for digest_file in /tmp/digests/dockerhub/*; do
            [ -e "$digest_file" ] || continue
            digest="$(basename "$digest_file")"
            docker_refs+=("${DOCKERHUB_IMAGE}@sha256:${digest}")
          done

          if [ "${#docker_refs[@]}" -eq 0 ]; then
            echo "No Docker Hub digests found" >&2
            exit 1
          fi

          docker buildx imagetools create \
            -t "${DOCKERHUB_IMAGE}:${ROOT_VERSION}-${{ matrix.distro }}" \
            "${docker_refs[@]}"

      - name: Create and push GHCR manifest for versioned ${{ matrix.distro }} tag
        run: |
          ghcr_refs=()
          for digest_file in /tmp/digests/ghcr/*; do
            [ -e "$digest_file" ] || continue
            digest="$(basename "$digest_file")"
            ghcr_refs+=("${GHCR_IMAGE}@sha256:${digest}")
          done

          if [ "${#ghcr_refs[@]}" -eq 0 ]; then
            echo "No GHCR digests found" >&2
            exit 1
          fi

          docker buildx imagetools create \
            -t "${GHCR_IMAGE}:${ROOT_VERSION}-${{ matrix.distro }}" \
            "${ghcr_refs[@]}"

      - name: Create and push Docker Hub manifest for latest Ubuntu
        if: matrix.distro == 'ubuntu24'
        run: |
          docker_refs=()
          for digest_file in /tmp/digests/dockerhub/*; do
            [ -e "$digest_file" ] || continue
            digest="$(basename "$digest_file")"
            docker_refs+=("${DOCKERHUB_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t "${DOCKERHUB_IMAGE}:latest-ubuntu24" \
            "${docker_refs[@]}"

      - name: Create and push GHCR manifest for latest Ubuntu
        if: matrix.distro == 'ubuntu24'
        run: |
          ghcr_refs=()
          for digest_file in /tmp/digests/ghcr/*; do
            [ -e "$digest_file" ] || continue
            digest="$(basename "$digest_file")"
            ghcr_refs+=("${GHCR_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t "${GHCR_IMAGE}:latest-ubuntu24" \
            "${ghcr_refs[@]}"

      - name: Create and push Docker Hub default Ubuntu aliases
        if: matrix.distro == 'ubuntu24'
        run: |
          docker_refs=()
          for digest_file in /tmp/digests/dockerhub/*; do
            [ -e "$digest_file" ] || continue
            digest="$(basename "$digest_file")"
            docker_refs+=("${DOCKERHUB_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t "${DOCKERHUB_IMAGE}:latest" \
            -t "${DOCKERHUB_IMAGE}:${ROOT_VERSION}" \
            "${docker_refs[@]}"

      - name: Create and push GHCR default Ubuntu aliases
        if: matrix.distro == 'ubuntu24'
        run: |
          ghcr_refs=()
          for digest_file in /tmp/digests/ghcr/*; do
            [ -e "$digest_file" ] || continue
            digest="$(basename "$digest_file")"
            ghcr_refs+=("${GHCR_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t "${GHCR_IMAGE}:latest" \
            -t "${GHCR_IMAGE}:${ROOT_VERSION}" \
            "${ghcr_refs[@]}"
