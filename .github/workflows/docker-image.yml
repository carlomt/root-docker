name: Docker Multiarch Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  docker_build:
    name: Build ${{ matrix.distro }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu24
            context: ./ubuntu24_from_source
            runner: ubuntu-24.04
            arch: amd64
          - distro: ubuntu24
            context: ./ubuntu24_from_source
            runner: ubuntu-24.04-arm
            arch: arm64
          - distro: alma9
            context: ./alma9_from_source
            runner: ubuntu-24.04
            arch: amd64
          - distro: alma9
            context: ./alma9_from_source
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set ROOT_VERSION environment variable
        run: |
          ROOT_VERSION=$(cat VERSION)
          echo "ROOT_VERSION=$ROOT_VERSION" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ env.USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.USER }}/root:latest-${{ matrix.distro }}-${{ matrix.arch }}
            ${{ env.USER }}/root:${{ env.ROOT_VERSION }}-${{ matrix.distro }}-${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}
          build-args: |
            ROOT_VERSION=${{ env.ROOT_VERSION }}
            CMAKE_CXX_STANDARD=17
          cache-from: type=gha,scope=${{ matrix.distro }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}-${{ matrix.arch }}

  docker_manifest:
    name: Create manifest ${{ matrix.distro }}
    needs: docker_build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu24
          - distro: alma9
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set ROOT_VERSION environment variable
        run: |
          ROOT_VERSION=$(cat VERSION)
          echo "ROOT_VERSION=$ROOT_VERSION" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push Docker manifest for latest-${{ matrix.distro }}
        run: |
          docker buildx imagetools create \
            -t ${{ env.USER }}/root:latest-${{ matrix.distro }} \
            ${{ env.USER }}/root:latest-${{ matrix.distro }}-amd64 \
            ${{ env.USER }}/root:latest-${{ matrix.distro }}-arm64

      - name: Create and push Docker manifest for versioned ${{ matrix.distro }} tag
        run: |
          docker buildx imagetools create \
            -t ${{ env.USER }}/root:${{ env.ROOT_VERSION }}-${{ matrix.distro }} \
            ${{ env.USER }}/root:${{ env.ROOT_VERSION }}-${{ matrix.distro }}-amd64 \
            ${{ env.USER }}/root:${{ env.ROOT_VERSION }}-${{ matrix.distro }}-arm64

  docker_default_manifest:
    name: Create default Ubuntu manifest aliases
    needs: docker_manifest
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set ROOT_VERSION environment variable
        run: |
          ROOT_VERSION=$(cat VERSION)
          echo "ROOT_VERSION=$ROOT_VERSION" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push Docker manifest for latest
        run: |
          docker buildx imagetools create \
            -t ${{ env.USER }}/root:latest \
            ${{ env.USER }}/root:latest-ubuntu24-amd64 \
            ${{ env.USER }}/root:latest-ubuntu24-arm64

      - name: Create and push Docker manifest for versioned tag
        run: |
          docker buildx imagetools create \
            -t ${{ env.USER }}/root:${{ env.ROOT_VERSION }} \
            ${{ env.USER }}/root:${{ env.ROOT_VERSION }}-ubuntu24-amd64 \
            ${{ env.USER }}/root:${{ env.ROOT_VERSION }}-ubuntu24-arm64
