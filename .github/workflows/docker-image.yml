name: Docker Multiarch Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/root
  # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker_build:
    name: Build ${{ matrix.distro }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write
      actions: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu24
            context: ./ubuntu24_from_source
            runner: ubuntu-24.04
            arch: amd64
          - distro: ubuntu24
            context: ./ubuntu24_from_source
            runner: ubuntu-24.04-arm
            arch: arm64
          - distro: alma10
            context: ./alma10_from_source
            runner: ubuntu-24.04
            arch: amd64
          - distro: alma10
            context: ./alma10_from_source
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set ROOT_VERSION environment variable
        run: |
          ROOT_VERSION=$(cat VERSION)
          echo "ROOT_VERSION=$ROOT_VERSION" >> "$GITHUB_ENV"

      - name: Set image names
        run: |
          echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/root" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image for pull request
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: false
          platforms: linux/${{ matrix.arch }}
          build-args: |
            ROOT_VERSION=${{ env.ROOT_VERSION }}
            CMAKE_CXX_STANDARD=17
          cache-from: type=gha,scope=${{ matrix.distro }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}-${{ matrix.arch }}

      - name: Build and push Docker image by digest
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/${{ matrix.arch }}
          outputs: |
            type=image,name=${{ env.DOCKERHUB_IMAGE }},push-by-digest=true,name-canonical=true,push=true
            type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            ROOT_VERSION=${{ env.ROOT_VERSION }}
            CMAKE_CXX_STANDARD=17
          cache-from: type=gha,scope=${{ matrix.distro }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}-${{ matrix.arch }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.distro }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker_manifest:
    name: Create manifest ${{ matrix.distro }}
    needs: docker_build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu24
          - distro: alma10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set ROOT_VERSION environment variable
        run: |
          ROOT_VERSION=$(cat VERSION)
          echo "ROOT_VERSION=$ROOT_VERSION" >> "$GITHUB_ENV"

      - name: Set image names
        run: |
          echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/root" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.distro }}-*
          merge-multiple: true

      - name: Create and push Docker Hub manifest for versioned ${{ matrix.distro }} tag
        run: |
          docker_refs=()
          for digest_file in /tmp/digests/*; do
            digest="$(basename "$digest_file")"
            docker_refs+=("${DOCKERHUB_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t ${DOCKERHUB_IMAGE}:${ROOT_VERSION}-${{ matrix.distro }} \
            "${docker_refs[@]}"

      - name: Create and push GHCR manifest for versioned ${{ matrix.distro }} tag
        run: |
          ghcr_refs=()
          for digest_file in /tmp/digests/*; do
            digest="$(basename "$digest_file")"
            ghcr_refs+=("${GHCR_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t ${GHCR_IMAGE}:${ROOT_VERSION}-${{ matrix.distro }} \
            "${ghcr_refs[@]}"

      - name: Create and push Docker Hub manifest for latest Ubuntu
        if: matrix.distro == 'ubuntu24'
        run: |
          docker_refs=()
          for digest_file in /tmp/digests/*; do
            digest="$(basename "$digest_file")"
            docker_refs+=("${DOCKERHUB_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t ${DOCKERHUB_IMAGE}:latest-ubuntu24 \
            "${docker_refs[@]}"

      - name: Create and push GHCR manifest for latest Ubuntu
        if: matrix.distro == 'ubuntu24'
        run: |
          ghcr_refs=()
          for digest_file in /tmp/digests/*; do
            digest="$(basename "$digest_file")"
            ghcr_refs+=("${GHCR_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t ${GHCR_IMAGE}:latest-ubuntu24 \
            "${ghcr_refs[@]}"

      - name: Create and push Docker Hub default Ubuntu aliases
        if: matrix.distro == 'ubuntu24'
        run: |
          docker_refs=()
          for digest_file in /tmp/digests/*; do
            digest="$(basename "$digest_file")"
            docker_refs+=("${DOCKERHUB_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t ${DOCKERHUB_IMAGE}:latest \
            -t ${DOCKERHUB_IMAGE}:${ROOT_VERSION} \
            "${docker_refs[@]}"

      - name: Create and push GHCR default Ubuntu aliases
        if: matrix.distro == 'ubuntu24'
        run: |
          ghcr_refs=()
          for digest_file in /tmp/digests/*; do
            digest="$(basename "$digest_file")"
            ghcr_refs+=("${GHCR_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t ${GHCR_IMAGE}:latest \
            -t ${GHCR_IMAGE}:${ROOT_VERSION} \
            "${ghcr_refs[@]}"
